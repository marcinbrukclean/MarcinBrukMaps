<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarcinBrukMaps - naprawa danych</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07111f;
      color: #f5f8ff;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(560px, 100%);
      background: #101b2d;
      border: 1px solid #263650;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 24px 70px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 12px; font-size: 26px; }
    p { color: #c8d4e8; line-height: 1.5; }
    button {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 16px 18px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      background: #35b8ef;
    }
    button.danger { background: #333d4d; }
    #result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #07111f;
      color: #dce8ff;
      white-space: pre-wrap;
    }
    a { color: #6dd3ff; font-weight: 800; }
  </style>
</head>
<body>
  <main>
    <h1>Naprawa danych MarcinBrukMaps</h1>
    <p>
      Jeśli aplikacja przestała się otwierać po dodaniu zdjęć, użyj pierwszego przycisku.
      Posesje zostaną, ale ciężkie zdjęcia zostaną usunięte z pamięci telefonu.
    </p>

    <button id="stripPhotos">Usuń tylko zdjęcia, zostaw posesje</button>
    <button id="clearCache">Odśwież pamięć aplikacji</button>
    <button id="clearAll" class="danger">Wyczyść wszystkie dane aplikacji</button>

    <div id="result">Gotowe do naprawy.</div>

    <p>
      Po naprawie otwórz:
      <br>
      <a href="./?v=23">MarcinBrukMaps v23</a>
    </p>
  </main>

  <script>
    const MAIN_KEY = "marcinbrukmaps-saved-buildings";
    const LITE_KEY = "marcinbrukmaps-saved-buildings-lite";
    const result = document.getElementById("result");

    function setResult(message) {
      result.textContent = message;
    }

    function parseJson(value) {
      if (!value) return null;
      try {
        return JSON.parse(value);
      } catch {
        return null;
      }
    }

    function stripHeavyPhotos(value) {
      if (Array.isArray(value)) {
        return value.map(stripHeavyPhotos);
      }

      if (value && typeof value === "object") {
        const clean = {};
        let removed = false;

        for (const [key, item] of Object.entries(value)) {
          const lowerKey = key.toLowerCase();
          const isHeavyPhoto =
            typeof item === "string" &&
            (item.startsWith("data:image") || item.length > 20000) &&
            (lowerKey.includes("photo") || lowerKey.includes("image") || item.startsWith("data:image"));

          if (isHeavyPhoto) {
            removed = true;
            continue;
          }

          clean[key] = stripHeavyPhotos(item);
        }

        if (removed) {
          clean.photoRemoved = true;
        }

        return clean;
      }

      return value;
    }

    async function clearCaches() {
      if ("serviceWorker" in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }

      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map((key) => caches.delete(key)));
      }
    }

    document.getElementById("stripPhotos").addEventListener("click", async () => {
      const main = parseJson(localStorage.getItem(MAIN_KEY));
      const lite = parseJson(localStorage.getItem(LITE_KEY));
      const source = main || lite || [];

      const clean = stripHeavyPhotos(source);

      localStorage.setItem(MAIN_KEY, JSON.stringify(clean));
      localStorage.setItem(LITE_KEY, JSON.stringify(clean));
      await clearCaches();

      const count = Array.isArray(clean) ? clean.length : 0;
      setResult("Naprawione. Zostawiono posesje: " + count + ". Usunięto ciężkie zdjęcia i odświeżono pamięć aplikacji.");
    });

    document.getElementById("clearCache").addEventListener("click", async () => {
      await clearCaches();
      setResult("Odświeżono pamięć aplikacji. Teraz otwórz MarcinBrukMaps v23.");
    });

    document.getElementById("clearAll").addEventListener("click", async () => {
      const ok = confirm("To usunie wszystkie zapisane posesje i trasy. Na pewno?");
      if (!ok) return;

      Object.keys(localStorage)
        .filter((key) => key.includes("marcinbrukmaps"))
        .forEach((key) => localStorage.removeItem(key));

      await clearCaches();
      setResult("Wyczyszczono wszystkie dane aplikacji.");
    });
  </script>
</body>
</html>
