<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#07111f" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./style.css" />
    <title>MarcinBrukMaps</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Field mapper</p>
          <h1>Marcin Bruk Clean</h1>
        </div>
        <button id="locateBtn" class="pill">Moja lokalizacja</button>
      </header>

      <main class="main-content">
        <div id="map" class="map-view"></div>

        <div class="status-panel">
          <p id="status">Kliknij posesję na mapie, aby zapisać ją ręcznie. Automatyczne obrysy są funkcją testową.</p>
        </div>

        <div class="bottom-bar">
          <button id="locateBtnBottom" class="toolbar-button">Moja lokalizacja</button>
          <button id="refreshBtn" class="toolbar-button">Spróbuj pobrać obrysy</button>
          <button id="exportBtn" class="toolbar-button small">Eksportuj dane</button>
          <button id="importBtn" class="toolbar-button small">Importuj dane</button>
          <div class="saved-count">Zapisane: <span id="savedCount">0</span></div>
          <p class="bottom-hint">Kliknij posesję na mapie, aby zapisać ją ręcznie. Automatyczne obrysy są funkcją testową.</p>
        </div>
      </main>
    </div>

    <div id="sheet" class="sheet hidden">
      <div class="sheet-handle"></div>
      <div class="sheet-body">
        <div class="sheet-header">
          <h2>Dodaj / edytuj posesję</h2>
          <button id="closeSheet" class="close-sheet" aria-label="Close">×</button>
        </div>

        <label class="field">
          <span>Status</span>
          <select id="statusSelect">
            <option value="Potential client">Potencjalny klient</option>
            <option value="Flyer delivered">Ulotka wrzucona</option>
            <option value="Not interested">Niezainteresowany</option>
            <option value="Customer">Klient</option>
            <option value="Come back later">Wrócić później</option>
          </select>
        </label>
        <label class="field">
          <span>Potencjał</span>
          <select id="potentialSelect">
            <option value="A">A - bardzo dobry</option>
            <option value="B">B - średni</option>
            <option value="C">C - słaby</option>
          </select>
        </label>
        <label class="field">
          <span>Usługa</span>
          <select id="serviceTypeSelect">
            <option value="Kostka brukowa">Kostka brukowa</option>
            <option value="Elewacja">Elewacja</option>
            <option value="Dach">Dach</option>
            <option value="Taras">Taras</option>
            <option value="Podjazd">Podjazd</option>
            <option value="Inne">Inne</option>
          </select>
        </label>
        <label class="field">
          <span>Szacowana powierzchnia m²</span>
          <input id="estimatedArea" type="number" min="0" step="0.1" placeholder="Opcjonalnie" />
        </label>
        <label class="field">
          <span>Data powrotu</span>
          <input id="followUpDate" type="date" />
        </label>
        <label class="field">
          <span>Adres / wskazówka</span>
          <input id="addressHint" type="text" placeholder="Opcjonalnie" />
        </label>
        <label class="field">
          <span>Notatki</span>
          <textarea id="notes" rows="4" placeholder="Dodaj uwagi..."></textarea>
        </label>

        <div class="sheet-actions">
          <button id="deleteBtn" class="secondary">Usuń / reset</button>
          <button id="saveBtn" class="primary">Zapisz</button>
        </div>
      </div>
    </div>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
